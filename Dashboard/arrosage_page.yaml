type: sections
max_columns: 2
title: Arrosage
path: arrosage
icon: mdi:sprinkler-variant
cards: []
sections:
  - type: grid
    cards:
      - type: custom:mushroom-chips-card
        chips:
          - type: back
          - type: template
            content: ARROSAGE
            uix:
              style: |
                ha-card {
                  border: none;
                  background: none !important;
                }
          - type: spacer
          - type: template
            icon: mdi:calendar-clock
            icon_color: >-
              {{ 'deep-orange' if is_state('calendar.arrosage', 'unknown') else
              'light-green' }}
            tap_action:
              action: navigate
              navigation_path: planning-arrosage
          - type: template
            icon: mdi:tune
            icon_color: deep-orange
            tap_action:
              action: navigate
              navigation_path: parametres-dashboard-arrosage
        grid_options:
          columns: full
          rows: auto
    column_span: 2
  - type: grid
    cards:
      - type: vertical-stack
        cards:
          - type: custom:streamline-card
            template: misha_arrosage_notification_arrosage_en_cours
            variables:
              numero_de_la_zone: "1"
            grid_options:
              columns: full
          - type: custom:streamline-card
            template: misha_arrosage_notification_arrosage_en_cours
            variables:
              numero_de_la_zone: "2"
            grid_options:
              columns: full
          - type: custom:streamline-card
            template: misha_arrosage_notification_arrosage_en_cours
            variables:
              numero_de_la_zone: "3"
            grid_options:
              columns: full
        grid_options:
          columns: full
    column_span: 2
  - type: grid
    cards:
      - type: custom:streamline-card
        template: misha_arrosage_zone
        variables:
          numero_de_la_zone: "1"
      - type: custom:streamline-card
        template: misha_arrosage_voie
        variables:
          numero_de_la_voie: "1"
          nom_de_la_voie: Fraisiers
      - type: custom:streamline-card
        template: misha_arrosage_voie
        variables:
          numero_de_la_voie: "2"
          nom_de_la_voie: Tomates
      - type: custom:streamline-card
        template: misha_arrosage_voie
        variables:
          numero_de_la_voie: "3"
          nom_de_la_voie: Melons
      - type: custom:streamline-card
        template: misha_arrosage_voie
        variables:
          numero_de_la_voie: "4"
          nom_de_la_voie: Salades
      - type: custom:streamline-card
        template: misha_arrosage_voie
        variables:
          numero_de_la_voie: "8"
          nom_de_la_voie: Courgettes
      - type: custom:streamline-card
        template: misha_arrosage_zone
        variables:
          numero_de_la_zone: "2"
      - type: custom:streamline-card
        template: misha_arrosage_voie
        variables:
          numero_de_la_voie: "7"
          nom_de_la_voie: Abricotier/Poirier/Prunier
      - type: custom:streamline-card
        template: misha_arrosage_voie
        variables:
          numero_de_la_voie: "9"
          nom_de_la_voie: Pêcher/Figuier
  - type: grid
    cards:
      - type: custom:streamline-card
        template: misha_arrosage_zone
        variables:
          numero_de_la_zone: "3"
      - type: custom:streamline-card
        template: misha_arrosage_voie
        variables:
          numero_de_la_voie: "5"
          nom_de_la_voie: Oranger
      - type: custom:streamline-card
        template: misha_arrosage_voie
        variables:
          numero_de_la_voie: "6"
          nom_de_la_voie: Citronnier
      - type: custom:mushroom-title-card
        title: ""
        subtitle: Infos complémentaires
        uix:
          style: |
            .subtitle {
              border-bottom: 1px solid var(--ha-card-border-color,var(--divider-color,#e0e0e0));
              padding-bottom: 0px;
            }
            .header {
              margin-bottom: -7px;
            }
      - type: vertical-stack
        cards:
          - type: custom:mod-card
            uix:
              style: |
                ha-card {
                  background: #fff4e0;
                  --grid-card-gap: 0x;
                  border: 1px solid #dbdbdb;
                }
            card:
              type: grid
              square: false
              columns: 2
              cards:
                - type: custom:mushroom-template-card
                  multiline_secondary: true
                  primary: ""
                  secondary: >-
                    Vous n'avez pas encore installé l'intégration Calendrier
                    local.
                  icon: mdi:calendar-clock
                  tap_action:
                    action: none
                  color: deep-orange
                  features_position: bottom
                  uix:
                    style: |
                      ha-card {
                        border: none;
                        background: none;
                        margin-right: -100%;
                        padding-right: 100px;
                      }
                - type: custom:mushroom-chips-card
                  chips:
                    - type: template
                      icon: mdi:devices
                      tap_action:
                        action: navigate
                        navigation_path: /config/integrations/dashboard
                      uix:
                        style: |
                          ha-card {
                            border:none;
                            --chip-border-radius: 12px;
                            --chip-background: rgba(var(--rgb-primary-text-color), 0.1);
                          }
                    - type: template
                      tap_action:
                        action: url
                        url_path: >-
                          https://github.com/tochy83/My-irrigation-system-for-HA/blob/main/INSTALLATION.md#--etape-10-
                      icon: mdi:help-circle-outline
                      icon_color: light-blue
                      uix:
                        style: |
                          ha-card {
                            border:none;
                            --chip-border-radius: 12px;
                            --chip-background: rgba(var(--rgb-primary-text-color), 0.1);
                          }
                  alignment: end
                  uix:
                    style: |
                      ha-card {
                        background: none;
                        padding-right: 8px;
                        padding-top: 9px;
                      }
            grid_options:
              columns: full
            visibility:
              - condition: state
                entity: sensor.calendars
                state: "0"
          - type: custom:mod-card
            uix:
              style: |
                ha-card {
                  background: #fff4e0;
                  --grid-card-gap: 0x;
                  border: 1px solid #dbdbdb;
                }
            card:
              type: grid
              square: false
              columns: 2
              cards:
                - type: custom:mushroom-template-card
                  multiline_secondary: true
                  primary: ""
                  secondary: Vous n'avez pas encore créé de calendrier nommé Arrosage.
                  icon: mdi:calendar-clock
                  tap_action:
                    action: none
                  color: deep-orange
                  features_position: bottom
                  uix:
                    style: |
                      ha-card {
                        border: none;
                        background: none;
                        margin-right: -100%;
                        padding-right: 100px;
                      }
                - type: custom:mushroom-chips-card
                  chips:
                    - type: template
                      icon: mdi:calendar-edit-outline
                      tap_action:
                        action: navigate
                        navigation_path: /calendar
                      uix:
                        style: |
                          ha-card {
                            border:none; 
                            --chip-border-radius: 12px;
                            --chip-background: rgba(var(--rgb-primary-text-color), 0.1);
                          }
                    - type: template
                      tap_action:
                        action: url
                        url_path: >-
                          https://github.com/tochy83/My-irrigation-system-for-HA/blob/main/INSTALLATION.md#--etape-10-
                      icon: mdi:help-circle-outline
                      icon_color: light-blue
                      uix:
                        style: |
                          ha-card {
                            border:none; 
                            --chip-border-radius: 12px;
                            --chip-background: rgba(var(--rgb-primary-text-color), 0.1);
                          }
                  alignment: end
                  uix:
                    style: |
                      ha-card {
                        background: none;
                        padding-right: 8px;
                        padding-top: 9px;
                      }
            grid_options:
              columns: full
            visibility:
              - condition: state
                entity: calendar.arrosage
                state: unknown
              - condition: numeric_state
                entity: sensor.calendars
                above: 0
          - type: custom:mod-card
            uix:
              style: |
                ha-card {
                  background: #fff4e0;
                  --grid-card-gap: 0x;
                  border: 1px solid #dbdbdb;
                }
            card:
              type: grid
              square: false
              columns: 2
              cards:
                - type: custom:mushroom-template-card
                  multiline_secondary: true
                  primary: Prochains arrosages
                  secondary: Vous n'avez pas installé l'intégration Calendar Merge
                  icon: mdi:calendar-clock
                  tap_action:
                    action: navigate
                    navigation_path: /hacs
                  color: deep-orange
                  features_position: bottom
                  uix:
                    style: |
                      ha-card {
                        border: none;
                        background: none;
                        margin-right: -100%;
                        padding-right: 100px;
                      }
                - type: custom:mushroom-chips-card
                  chips:
                    - type: template
                      icon: mdi:store-plus-outline
                      tap_action:
                        action: navigate
                        navigation_path: /hacs
                      uix:
                        style: |
                          ha-card {
                            border:none; 
                            --chip-border-radius: 12px;
                            --chip-background: rgba(var(--rgb-primary-text-color), 0.1);
                          }
                  alignment: end
                  uix:
                    style: |
                      ha-card {
                        background: none;
                        padding-right: 8px;
                        padding-top: 9px;
                      }
            grid_options:
              columns: full
            visibility:
              - condition: state
                entity: update.calendar_merge_update
                state: unknown
              - condition: state
                entity: calendar.arrosage
                state_not: unknown
          - type: custom:mod-card
            uix:
              style: |
                ha-card {
                  background: #fff4e0;
                  --grid-card-gap: 0x;
                  border: 1px solid #dbdbdb;
                }
            card:
              type: grid
              square: false
              columns: 2
              cards:
                - type: custom:mushroom-template-card
                  multiline_secondary: true
                  primary: Prochains arrosages
                  secondary: Vous n'avez pas configuré l'entrée Calendar Merge
                  icon: mdi:calendar-clock
                  color: deep-orange
                  features_position: bottom
                  tap_action:
                    action: navigate
                    navigation_path: /config/helpers
                  uix:
                    style: |
                      ha-card {
                        border: none;
                        background: none;
                        margin-right: -100%;
                        padding-right: 100px;
                      }
                - type: custom:mushroom-chips-card
                  chips:
                    - type: template
                      icon: mdi:devices
                      tap_action:
                        action: navigate
                        navigation_path: /config/helpers
                      uix:
                        style: |
                          ha-card {
                            border:none; 
                            --chip-border-radius: 12px;
                            --chip-background: rgba(var(--rgb-primary-text-color), 0.1);
                          }
                    - type: template
                      tap_action:
                        action: url
                        url_path: >-
                          https://github.com/tochy83/My-irrigation-system-for-HA/blob/main/INSTALLATION.md#--etape-10-
                      icon: mdi:help-circle-outline
                      icon_color: light-blue
                      uix:
                        style: |
                          ha-card {
                            border:none; 
                            --chip-border-radius: 12px;
                            --chip-background: rgba(var(--rgb-primary-text-color), 0.1);
                          }
                  alignment: end
                  uix:
                    style: |
                      ha-card {
                        background: none;
                        padding-right: 8px;
                        padding-top: 9px;
                      }
            grid_options:
              columns: full
            visibility:
              - condition: state
                entity: calendar.misha_arrosage_a_venir
                state: unknown
              - condition: state
                entity: calendar.arrosage
                state_not: unknown
          - type: custom:mushroom-template-card
            multiline_secondary: true
            primary: Prochains arrosages
            secondary: >-
              {% if states('sensor.misha_arrosage_a_venir')|int(0) > 0 %}  


              {% for i in range(0,
              states('sensor.misha_arrosage_a_venir')|int(0)) %}

              {{states('sensor.misha_arrosage_a_venir_event_' ~ i)}}

              {%- endfor %}


              {% else %}
                Aucune programmation d'arrosage prévue
              {% endif %}
            icon: mdi:calendar-clock
            color: light-green
            features_position: bottom
            tap_action:
              action: navigate
              navigation_path: planning-arrosage
            grid_options:
              columns: full
            visibility:
              - condition: state
                entity: calendar.misha_arrosage_a_venir
                state_not: unknown
              - condition: state
                entity: calendar.arrosage
                state_not: unknown
          - type: custom:mushroom-template-card
            primary: Programmation arrosage
            secondary: Voir/Modifier les horaires d'arrosage
            icon: mdi:calendar-clock
            color: light-green
            tap_action:
              action: navigate
              navigation_path: /dashboard-arrosage/planning-arrosage
            grid_options:
              columns: full
            visibility:
              - condition: state
                entity: calendar.arrosage
                state_not: unknown
            features_position: bottom
        grid_options:
          columns: full
      - type: custom:mushroom-chips-card
        chips:
          - type: spacer
        grid_options:
          columns: full
          rows: auto
        uix:
          style: |
            ha-card {
              padding-bottom: 10px;
            }
      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:streamline-card
            template: misha_arrosage_zone_conectivity
            variables:
              numero_de_la_zone: "1"
          - type: custom:streamline-card
            template: misha_arrosage_zone_conectivity
            variables:
              numero_de_la_zone: "2"
          - type: custom:streamline-card
            template: misha_arrosage_zone_conectivity
            variables:
              numero_de_la_zone: "3"
      - type: custom:mushroom-chips-card
        chips:
          - type: spacer
        grid_options:
          columns: full
          rows: auto
        uix:
          style: |
            ha-card {
              padding-bottom: 10px;
            }
      - type: custom:mushroom-template-card
        entity: sensor.misha_arrosage_compteur_eau
        primary: Compteur d'eau
        secondary: "{{ states(entity, with_unit=true) }}"
        multiline_secondary: true
        icon: mdi:water
        color: blue
        features_position: bottom
        grid_options:
          columns: full
