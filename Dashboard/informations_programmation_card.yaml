type: vertical-stack
cards:
  - type: custom:mod-card
    uix:
      style: |
        ha-card {
          background: #fff4e0;
          --grid-card-gap: 0x;
          border: 1px solid #dbdbdb;
        }
    card:
      type: grid
      square: false
      columns: 2
      cards:
        - type: custom:mushroom-template-card
          multiline_secondary: true
          primary: ""
          secondary: Vous n'avez pas encore installé l'intégration Calendrier local.
          icon: mdi:calendar-clock
          tap_action:
            action: none
          color: deep-orange
          features_position: bottom
          uix:
            style: |
              ha-card {
                border: none;
                background: none;
                margin-right: -100%;
                padding-right: 100px;
              }
        - type: custom:mushroom-chips-card
          chips:
            - type: template
              icon: mdi:devices
              tap_action:
                action: navigate
                navigation_path: /config/integrations/dashboard
              uix:
                style: |
                  ha-card {
                    border:none;
                    --chip-border-radius: 12px;
                    --chip-background: rgba(var(--rgb-primary-text-color), 0.1);
                  }
            - type: template
              tap_action:
                action: url
                url_path: >-
                  https://github.com/tochy83/My-irrigation-system-for-HA/blob/main/INSTALLATION.md#--etape-10-
              icon: mdi:help-circle-outline
              icon_color: light-blue
              uix:
                style: |
                  ha-card {
                    border:none;
                    --chip-border-radius: 12px;
                    --chip-background: rgba(var(--rgb-primary-text-color), 0.1);
                  }
          alignment: end
          uix:
            style: |
              ha-card {
                background: none;
                padding-right: 8px;
                padding-top: 9px;
              }
    grid_options:
      columns: full
    visibility:
      - condition: state
        entity: sensor.calendars
        state: "0"
  - type: custom:mod-card
    uix:
      style: |
        ha-card {
          background: #fff4e0;
          --grid-card-gap: 0x;
          border: 1px solid #dbdbdb;
        }
    card:
      type: grid
      square: false
      columns: 2
      cards:
        - type: custom:mushroom-template-card
          multiline_secondary: true
          primary: ""
