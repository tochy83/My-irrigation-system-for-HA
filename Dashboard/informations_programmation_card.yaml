      columns: full
    visibility:
      - condition: state
        entity: update.calendar_merge_update
        state: unknown
      - condition: state
        entity: calendar.arrosage
        state_not: unknown
  - type: custom:mod-card
    uix:
      style: |
        ha-card {
          background: #fff4e0;
          --grid-card-gap: 0x;
          border: 1px solid #dbdbdb;
        }
    card:
      type: grid
      square: false
      columns: 2
      cards:
        - type: custom:mushroom-template-card
          multiline_secondary: true
          primary: Prochains arrosages
          secondary: Vous n'avez pas configuré l'entrée Calendar Merge
          icon: mdi:calendar-clock
          color: deep-orange
          features_position: bottom
          tap_action:
            action: navigate
            navigation_path: /config/helpers
          uix:
            style: |
              ha-card {
                border: none;
                background: none;
                margin-right: -100%;
                padding-right: 100px;
              }
        - type: custom:mushroom-chips-card
          chips:
            - type: template
              icon: mdi:devices
              tap_action:
                action: navigate
                navigation_path: /config/helpers
              uix:
                style: |
                  ha-card {
                    border:none; 
                    --chip-border-radius: 12px;
                    --chip-background: rgba(var(--rgb-primary-text-color), 0.1);
                  }
            - type: template
              tap_action:
                action: url
                url_path: >-
                  https://github.com/tochy83/My-irrigation-system-for-HA/blob/main/INSTALLATION.md#--etape-10-
              icon: mdi:help-circle-outline
              icon_color: light-blue
              uix:
                style: |
                  ha-card {
                    border:none; 
                    --chip-border-radius: 12px;
                    --chip-background: rgba(var(--rgb-primary-text-color), 0.1);
                  }
          alignment: end
          uix:
            style: |
              ha-card {
                background: none;
                padding-right: 8px;
                padding-top: 9px;
              }
    grid_options:
      columns: full
    visibility:
      - condition: state
        entity: calendar.misha_arrosage_a_venir
        state: unknown
      - condition: state
        entity: calendar.arrosage
        state_not: unknown
  - type: custom:mushroom-template-card
    multiline_secondary: true
    primary: Prochains arrosages
    secondary: |-
      {% if states('sensor.misha_arrosage_a_venir')|int(0) > 0 %}  

      {% for i in range(0, states('sensor.misha_arrosage_a_venir')|int(0)) %}
      {{states('sensor.misha_arrosage_a_venir_event_' ~ i)}}
      {%- endfor %}

      {% else %}
        Aucune programmation d'arrosage prévue
      {% endif %}
    icon: mdi:calendar-clock
    color: light-green
    features_position: bottom
    tap_action:
      action: navigate
      navigation_path: planning-arrosage
    grid_options:
      columns: full
    visibility:
      - condition: state
        entity: calendar.misha_arrosage_a_venir
        state_not: unknown
      - condition: state
        entity: calendar.arrosage
        state_not: unknown
  - type: custom:mushroom-template-card
    primary: Programmation arrosage
    secondary: Voir/Modifier les horaires d'arrosage
    icon: mdi:calendar-clock
    color: light-green
    tap_action:
      action: navigate
      navigation_path: /dashboard-arrosage/planning-arrosage
    grid_options:
      columns: full
    visibility:
      - condition: state
        entity: calendar.arrosage
        state_not: unknown
    features_position: bottom
grid_options:
  columns: full

